    <style>
        /* Padronização conforme o código Institucional */
        body {
            color: black;
            background-color: white;
            font-family: Geneva, sans-serif;
            font-size: 25px;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            text-align: center;
            background-color: white;
            padding: 20px;
        }

        /* Estilização da Barra de Menu (Preta) */
        ul {
            background-color: black;
            font-family: Geneva, sans-serif;
            font-size: 22px; /* Ajustado levemente para caber o menu de contato */
            list-style: none;
            margin: 0;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        a:hover {
            color: yellow;
        }

        .separator {
            color: white;
        }

        .logo { 
            max-width: 250px;
            height: auto;
            margin-top: 20px;
        }

        /* Estilização do Conteúdo Principal */
        main {
            max-width: 800px;
            margin: 30px auto;
            padding: 40px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            text-align: left; /* Alinhamento para formulários */
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* Estilização do Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box; /* Garante que o padding não quebre o layout */
        }

        .btn-enviar {
            background-color: black;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-enviar:hover {
            background-color: #333;
            color: yellow;
        }

        footer {
            font-family: Geneva, sans-serif;
            font-size: 14px;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }

    </style>

<body>

    <main>
        <h1>FALE CONOSCO</h1>
        

        <!--Esse form class é uma das partes essenciais para encaminhar os dados dos formulário-->
        <form class="contact-form" action="https://formsubmit.co/cambeinovacao@gmail.com" method="POST" autocomplete="off">


        <div class="form-container">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="assunto">Assunto:</label>
                    <input type="text" id="assunto" name="assunto" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="6" required></textarea>
                </div>

                
            <!--O botão enviar e as duas linhas abaixo fazem parte também essencial para encaminhar os dados do formulário para o e-mail do destinatário-->
            <button type="submit">Enviar</button>
            <input type="hidden" name="_next" value="https://zanoniweb.github.io/instituicionalteste/thanks.html">
            <input type="hidden" name="_subject" value="New submission!">



            </form>
        </div>
    </main>
