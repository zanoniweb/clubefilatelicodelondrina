<h1>AGENDA DE EVENTOS ANUAIS: 2025.</h1>
    
    <label for="mes">Selecione um mês para ver a programação:</label>
    <select id="mes" onchange="mostrarEventos()">
        <option value="" selected>Selecionar</option>
        <option value="janeiro">Janeiro</option>
        <option value="fevereiro">Fevereiro</option>
        <option value="marco">Março</option>
        <option value="abril">Abril</option>
        <option value="maio">Maio</option>
        <option value="junho">Junho</option>
        <option value="julho">Julho</option>
        <option value="agosto">Agosto</option>
        <option value="setembro">Setembro</option>
        <option value="outubro">Outubro</option>
        <option value="novembro">Novembro</option>
        <option value="dezembro">Dezembro</option>
    </select>

    <div id="eventos"></div>

    <footer>
        <i>Site em desenvolvido por Juliano Zanoni, acadêmico do 7º semestre de Engenharia de Software da Universidade Anhanguera - Projeto de Extensão Acadêmica.</i>
    </footer>

<script>

const eventosPorMes = {
    janeiro: [{ data: "00/01/2026", titulo: "Reunião não agendada" }],
    fevereiro: [{ data: "21/02/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    marco: [{ data: "14/03/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    abril: [{ data: "11/04/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    maio: [{ data: "09/05/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    junho: [{ data: "13/06/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    julho: [{ data: "11/07/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    agosto: [{ data: "08/08/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    setembro: [{ data: "12/09/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    outubro: [{ data: "10/10/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    novembro: [{ data: "14/11/2026", titulo: "Reunião das 14:00 as 17:00 horas" }],
    dezembro: [{ data: "12/12/2026", titulo: "Reunião das 14:00 as 17:00 horas" }]
};

function mostrarEventos() {
    const mesSelecionado = document.getElementById("mes").value;
    const eventosDiv = document.getElementById("eventos");
    const campoDataBanner = document.getElementById("dataEventoDinamica");

    eventosDiv.innerHTML = ""; 

    if (mesSelecionado === "") {
        eventosDiv.innerHTML = "<b><p>Selecione um mês para ver os eventos.</p></b>";
        atualizarProximaReuniao(); // Volta para a próxima reunião automática se nada estiver selecionado
        return;
    }

    const listaEventos = eventosPorMes[mesSelecionado];

    if (listaEventos && listaEventos.length > 0) {
        campoDataBanner.innerText = listaEventos[0].data;
        listaEventos.forEach(evento => {
            const eventoElemento = document.createElement("div");
            eventoElemento.classList.add("evento");
            eventoElemento.innerHTML = `<strong>${evento.data}:</strong> ${evento.titulo}`;
            eventosDiv.appendChild(eventoElemento);
        });
    } else {
        eventosDiv.innerHTML = "<p>Sem eventos cadastrados para este mês.</p>";
        campoDataBanner.innerText = "SEM DATA";
    }
}

// NOVA FUNÇÃO: Encontra a próxima reunião baseada na data de hoje
function atualizarProximaReuniao() {
    const hoje = new Date();
    let proximaData = null;

    // Transforma o objeto em uma lista plana de todas as datas
    const todosEventos = Object.values(eventosPorMes).flat();

    for (let ev of todosEventos) {
        // Converte "DD/MM/YYYY" para objeto Date do JS
        const partes = ev.data.split("/");
        const dataEvento = new Date(partes[2], partes[1] - 1, partes[0]);

        if (dataEvento >= hoje) {
            proximaData = ev.data;
            break; // Para no primeiro que encontrar (pois estão em ordem)
        }
    }

    document.getElementById("dataEventoDinamica").innerText = proximaData || "Fim da Agenda";
}

window.onload = function() {
    atualizarProximaReuniao(); // Chama a lógica automática ao carregar
};

</script>
